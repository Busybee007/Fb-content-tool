services:
  - type: web
    name: fbtool
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    disk:
      name: fbtool-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: MEDIA_DIR
        value: /data/media
      - key: SECRET_KEY
        generateValue: true
      - key: DRIVE_PARENT_FOLDER_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON_B64
        sync: false
